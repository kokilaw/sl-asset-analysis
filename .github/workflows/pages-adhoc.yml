name: Adhoc Generate and Publish Reports

on:
  workflow_dispatch:
    inputs:
      generate_weekly_report:
        description: Generate weekly stock report (portfolio.py)
        required: true
        type: boolean
        default: true
      generate_monthly_report:
        description: Generate monthly unit trust report (portfolio_monthly.py)
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Generate selected reports
        env:
          RUN_WEEKLY: ${{ inputs.generate_weekly_report }}
          RUN_MONTHLY: ${{ inputs.generate_monthly_report }}
        run: |
          if [ "$RUN_WEEKLY" = "true" ]; then
            python portfolio.py
          fi

          if [ "$RUN_MONTHLY" = "true" ]; then
            python portfolio_monthly.py
          fi

          mkdir -p generated

      - name: Build index page
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path

          generated = Path('generated')
          generated.mkdir(exist_ok=True)

          links = []
          files = [
              ('portfolio_report.html', 'Weekly Stock Report'),
              ('monthly_portfolio_report.html', 'Monthly Unit Trust Report'),
              ('portfolio_email.html', 'Portfolio Email View'),
          ]

          for filename, label in files:
              path = generated / filename
              if path.exists():
                  links.append(f'<li><a href="{filename}">{label}</a></li>')

          now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          html = f'''<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>SL Asset Analysis Reports (Adhoc)</title>
            <style>
              body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }}
              h1 {{ margin-bottom: 4px; }}
              p {{ color: #555; }}
              ul {{ line-height: 1.9; }}
              a {{ text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
            </style>
          </head>
          <body>
            <h1>SL Asset Analysis Reports (Adhoc)</h1>
            <p>Last generated: {now}</p>
            <ul>
              {''.join(links) if links else '<li>No reports were generated in this run.</li>'}
            </ul>
          </body>
          </html>'''

          (generated / 'index.html').write_text(html, encoding='utf-8')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: generated

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
