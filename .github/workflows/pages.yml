name: Build and Deploy Reports to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    # Weekly run: Sunday 9:00 AM AEST (Saturday 23:00 UTC)
    - cron: "0 23 * * 6"
    # Monthly check window: 9:00 PM AEST on day 28-31 (11:00 UTC),
    # run monthly report only when it is the actual month-end in AEST.
    - cron: "0 11 28-31 * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      report_mode: ${{ steps.decide.outputs.report_mode }}

    steps:
      - name: Decide report mode
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          should_run="true"
          report_mode="both"

          if [ "$EVENT_NAME" = "schedule" ]; then
            if [ "$EVENT_SCHEDULE" = "0 23 * * 6" ]; then
              report_mode="weekly"
            elif [ "$EVENT_SCHEDULE" = "0 11 28-31 * *" ]; then
              tomorrow_day=$(TZ=Australia/Brisbane date -d 'tomorrow' +%d)
              if [ "$tomorrow_day" = "01" ]; then
                report_mode="monthly"
              else
                should_run="false"
              fi
            fi
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "report_mode=$report_mode" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Generate reports
        env:
          GOOGLE_SHEET_XLSX_URL: ${{ secrets.GOOGLE_SHEET_XLSX_URL }}
          REPORT_MODE: ${{ needs.prepare.outputs.report_mode }}
        run: |
          if [ "$REPORT_MODE" = "both" ] || [ "$REPORT_MODE" = "weekly" ]; then
            python portfolio.py
          fi

          if [ "$REPORT_MODE" = "both" ] || [ "$REPORT_MODE" = "monthly" ]; then
            python portfolio_monthly.py
          fi

          mkdir -p generated

      - name: Build index page
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path

          generated = Path('generated')
          generated.mkdir(exist_ok=True)

          links = []
          files = [
              ('portfolio_report.html', 'Weekly Stock Report'),
              ('monthly_portfolio_report.html', 'Monthly Unit Trust Report'),
              ('portfolio_email.html', 'Portfolio Email View'),
          ]

          for filename, label in files:
              path = generated / filename
              if path.exists():
                  links.append(f'<li><a href="{filename}">{label}</a></li>')

          now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          html = f'''<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>SL Asset Analysis Reports</title>
            <style>
              body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }}
              h1 {{ margin-bottom: 4px; }}
              p {{ color: #555; }}
              ul {{ line-height: 1.9; }}
              a {{ text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
            </style>
          </head>
          <body>
            <h1>SL Asset Analysis Reports</h1>
            <p>Last generated: {now}</p>
            <ul>
              {''.join(links) if links else '<li>No reports found.</li>'}
            </ul>
          </body>
          </html>'''

          (generated / 'index.html').write_text(html, encoding='utf-8')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: generated

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
